<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>I-Like-FlowersOS // TERMINAL</title>
    <link href="https://fonts.cdnfonts.com/css/perfect-dos-vga-437" rel="stylesheet">
    <style>
        :root {
            --vga-red: #aa0000;
            --vga-gray: #aaaaaa;
            --vga-white: #ffffff;
            --vga-green: #00aa00;
            --vga-blue: #0000aa;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: #000;
            color: var(--vga-gray);
            font-family: 'Perfect DOS VGA 437', monospace;
            font-smooth: never;
            -webkit-font-smoothing: none;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .terminal-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            max-width: 950px;
            margin: 0 auto;
            width: 100%;
        }

        #output { white-space: pre-wrap; line-height: 1.2; }
        
        .banner-red { 
            color: var(--vga-red); 
            white-space: pre; 
            line-height: 1; 
            display: block;
            margin: 15px 0;
        }

        .highlight { color: var(--vga-white); }
        .success { color: var(--vga-green); }
        
        #input-area { display: flex; align-items: center; margin-top: 10px; }
        #prompt { color: var(--vga-white); margin-right: 5px; white-space: nowrap; }
        #cmd-input {
            background: transparent;
            border: none;
            color: var(--vga-white);
            font-family: inherit;
            font-size: inherit;
            outline: none;
            width: 100%;
        }

        .bottom-bar {
            background-color: var(--vga-gray);
            color: #000;
            padding: 2px 20px;
            display: flex;
            gap: 25px;
            font-size: 14px;
            text-transform: uppercase;
            z-index: 100;
        }

        .bottom-bar a { color: #000; text-decoration: none; font-weight: bold; }
        .key-hint { color: var(--vga-blue); margin-right: 5px; }

        a { color: inherit; text-decoration: none; }
    </style>
</head>
<body>

<div class="terminal-container">
    <div id="output"></div>
    <div id="input-area" style="display:none;">
        <span id="prompt">i~like~flowers`#</span>
        <input type="text" id="cmd-input" autofocus spellcheck="false">
    </div>
</div>

<div class="bottom-bar">
    <span><span class="key-hint">F1</span><a href="https://github.com/Voblit/I-Like-FlowersOS" target="_blank">SOURCE</a></span>
    <span><span class="key-hint">F2</span><a href="https://github.com/Voblit/I-Like-FlowersOS/releases" target="_blank">RELEASES</a></span>
    <span><span class="key-hint">F3</span>HELP</span>
    <span style="margin-left: auto;">I-LIKE-FLOWERS_OS_V1.2</span>
</div>

<script>
    const output = document.getElementById('output');
    const inputArea = document.getElementById('input-area');
    const cmdInput = document.getElementById('cmd-input');
    const terminalContainer = document.querySelector('.terminal-container');
    
    let currentVersion = "v1.2.0-STABLE";

    const bannerArt = () => `
<span class="banner-red">                    .-~~~-
               .-~~~_._~~~\\   
               /~-~~   ~.  \`._ I like flowers OS
              /    \\     \\  | ~~-_ I like flowers OS
       __     |      |     | |  /~\\|   I like flowers OS
   _-~~  ~~-..|        ______||/__..-~~/
    ~-.___     \\     /~\\_________.-~~
          \\~~--._\\   |             / Current version: ${currentVersion}
           ^-_    ~\\  \\           /^
              ^~---|~~~~-.___.-~^
                /^^| | | |^~\\ Uptime: ${Math.floor(performance.now()/1000)}s
               //^' / /_/ ^~\\\\ Ram: 128MB [COSMOS_DEFAULT]
               /   //~||      \\
                   ~   || Your CPU: ${navigator.hardwareConcurrency || 8} Core Generic_x86_64
            ___      -(||      __ ___ _
           |\\|  \\       ||_.-~~ /|\\-  \\~-._
           | -\\| |      ||/    /  | |\\- | |\\ \\
            \\__-\\|______ ||  |    \\___\\|  \\_\\|
      _____ _.-~/|\\      \\\\||  \\  |  /       ~-.
    /'  --/|  / /|  \\    \\||    \\ /           |\\~-
   ' ---/| | |   |\\  |     ||                   \\__|
  | --/| | ;  \\ /|  /    -(|| The time is ${new Date().toLocaleString()}
  \`./  |  /      \\|/        ||)-
    \`~^~^                   ||</span>`;

    const bootSequence = [
        { t: "Cosmos Primary Kernel Bootloader starting...", d: 100 },
        { t: "GDT/IDT: Global Descriptor Tables initialized.", d: 150 },
        { t: "Scanning PCI Bus...", d: 400 },
        { t: "  Found Device: [01:01.0] IDE Controller (ATA)", d: 200, c: "highlight" },
        { t: "Cosmos.HAL.BlockDevice: Initializing ATA Master...", d: 300 },
        { t: "  ATA Master: Success. 40GB Fixed Drive [HDD0]", d: 200, c: "success" },
        { t: "Cosmos.System.VFS: Initializing Virtual File System...", d: 400 },
        { t: "  VFS: Registering Partition [0] (FAT32) on Drive [0]", d: 200, c: "success" },
        { t: "Kernel.Run() -> Invoking User Code...", d: 600 },
        { t: "------------------------------------------------------------", d: 100 }
    ];

    async function print(text, className = "") {
        const line = document.createElement('div');
        if (className) line.className = className;
        line.innerHTML = text;
        output.appendChild(line);
        terminalContainer.scrollTop = terminalContainer.scrollHeight;
    }

    async function runBoot() {
        for (let line of bootSequence) {
            await print(line.t, line.c);
            await new Promise(r => setTimeout(r, line.d));
        }
        await print(bannerArt());
        inputArea.style.display = 'flex';
        cmdInput.focus();
    }

    cmdInput.addEventListener('keydown', async (e) => {
        if (e.key === 'Enter') {
            const cmd = cmdInput.value.trim(); // Removed lowerCase to keep user input style
            const cmdLower = cmd.toLowerCase();
            // FIXED PROMPT HERE
            await print(`<span class="highlight">i~like~flowers\`# ${cmd}</span>`);
            cmdInput.value = '';

            switch(cmdLower) {
                case 'help':
                    await print("Available Commands:");
                    await print("  HELP     - Show this menu");
                    await print("  DOWNLOAD - View latest releases on GitHub");
                    await print("  SRC      - View kernel source code");
                    await print("  NEOFETCH - Display system banner");
                    await print("  CLS      - Clear screen");
                    break;
                case 'download':
                    await print("Opening GitHub Releases...", "success");
                    window.open('https://github.com/Voblit/I-Like-FlowersOS/releases', '_blank');
                    break;
                case 'src':
                    await print("Opening Source Repository...", "success");
                    window.open('https://github.com/Voblit/I-Like-FlowersOS', '_blank');
                    break;
                case 'neofetch':
                    await print(bannerArt());
                    break;
                case 'cls':
                    output.innerHTML = '';
                    break;
                case '':
                    break;
                default:
                    await print(`i~like~flowers\`#: ${cmd}: command not found`, "banner-red");
            }
        }
    });

    runBoot();
</script>
</body>
</html>
